    <title>Miel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

        body {
            background-color: #1a1a24;
            color: #b3b3cc;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin-top: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar-wrapper {
            position: relative;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #2a2a35;
            object-fit: cover;
            border: 2px solid #2a2a35;
        }

        .status-dot {
            width: 18px;
            height: 18px;
            background-color: #747f8d;
            border: 3px solid #1a1a24;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            right: 5px;
        }

        .title-area h1 {
            color: #eaeaea;
            margin: 0 0 5px 0;
            font-size: 24px;
        }

        .title-area p {
            margin: 0;
            color: #a3a3c2;
            font-size: 15px;
        }

        h2 {
            color: #eaeaea;
            font-size: 18px;
            margin-top: 35px;
            margin-bottom: 12px;
        }

        p {
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .highlight {
            color: #fff;
            font-weight: 700;
        }

        .birthday-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #23232f;
            padding: 10px 15px;
            border-radius: 8px;
            width: fit-content;
            margin-bottom: 20px;
            border: 1px solid #2d2d3d;
        }

        .contacts {
            list-style-type: none;
            padding: 0;
        }

        .contacts a {
            text-decoration: none;
            color: inherit;
        }

        .contacts li {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: #23232f;
            border: 1px solid transparent;
        }

        .discord-btn:hover { border-color: #5865f2; box-shadow: 0 0 15px rgba(88, 101, 242, 0.3); color: #5865f2; }
        .roblox-btn:hover { border-color: #ffffff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.15); color: #fff; }
        .tiktok-btn:hover { border-color: #ff0050; box-shadow: 0 0 15px rgba(255, 0, 80, 0.3); color: #ff0050; }

        .icon { width: 22px; height: 22px; fill: currentColor; }
        .interests-list { padding-left: 20px; }
        .interests-list li { margin-bottom: 8px; }
    </style>
</head>

    <script>
        function updateData() {
            const now = new Date();
            const noonBRT = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 15, 0, 0));
            document.getElementById('local-time').textContent = noonBRT.toLocaleTimeString(navigator.language, { hour: '2-digit', minute: '2-digit' });

            const bday = new Date(now.getFullYear(), 2, 20); 
            if (now > bday) bday.setFullYear(now.getFullYear() + 1);
            const diff = Math.ceil((bday - now) / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').textContent = `(${diff} days left)`;
        }

        async function getDiscordStatus() {
            const userId = "1239726174511300648"; 
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
                const data = await response.json();
                const status = data.data.discord_status;
                const dot = document.getElementById('discord-status');
                
                if (status === 'online') dot.style.backgroundColor = '#43b581';
                else if (status === 'dnd') dot.style.backgroundColor = '#f04747';
                else if (status === 'idle') dot.style.backgroundColor = '#faa61a';
                else dot.style.backgroundColor = '#747f8d';
            } catch (e) {}
        }

        updateData();
        getDiscordStatus();
    </script>
